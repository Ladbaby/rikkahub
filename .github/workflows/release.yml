name: Release Build

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'Pre-release'
        type: choice
        options:
          - Latest
          - Pre-release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install web-ui dependencies
        working-directory: web-ui
        run: pnpm install --frozen-lockfile

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Prepare build files
        run: |
          # 解码base64编码的keystore文件
          echo "${{ secrets.KEY_BASE64 }}" | base64 -d > app/app.key

          # 写入签名配置到local.properties
          echo "${{ secrets.SIGNING_CONFIG }}" > local.properties

          # 写入Google Services配置
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Gradle Build
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Extract version from build.gradle.kts
        id: version
        run: |
          VERSION=$(grep -oP '(?<=versionName = ")[^"]+' app/build.gradle.kts)
          echo "version=$VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Find previous tag
        id: prev
        run: |
          PREV=$(git tag --sort=-creatordate | grep -v "^${{ steps.version.outputs.version }}$" | head -1)
          if [ -z "$PREV" ]; then
            echo "No previous tag found — listing all commits up to HEAD."
            echo "prev=ALL" >> $GITHUB_OUTPUT
          else
            echo "Previous tag: $PREV"
            echo "prev=$PREV" >> $GITHUB_OUTPUT
          fi

      - name: Generate release notes
        run: |
          if [ "${{ steps.prev.outputs.prev }}" = "ALL" ]; then
            # The release tag isn't pushed yet, so use HEAD as the upper bound.
            bash .github/gen_release_note.sh -v "...HEAD"
          else
            bash .github/gen_release_note.sh \
              -v "${{ steps.prev.outputs.prev }}...${{ steps.version.outputs.version }}"
          fi
          cat release.md

      - name: Push tag
        run: git tag ${{ steps.version.outputs.version }} && git push origin ${{ steps.version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Checksums
        working-directory: app/build/outputs/apk/release
        run: |
          find . -name "*.apk" | sort | xargs sha256sum > checksums.txt
          cat checksums.txt

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          prerelease: ${{ github.event.inputs.release_type == 'Pre-release' }}
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/release/checksums.txt
          body_path: release.md
